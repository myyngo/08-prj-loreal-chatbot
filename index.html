<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'ORÉAL — Smart Routine &amp; Product Advisor</title>

    <!-- Google Fonts: Playfair Display (headings) + Nunito Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito+Sans:ital,wght@0,300;0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- ── Header ─────────────────────────────────────────── -->
    <header>
      <div class="header-inner">
        <img
          src="img/loreal-logo.png"
          alt="L'Oréal"
          class="logo"
          onerror="this.style.display='none'"
        />
        <div class="header-text">
          <h1>L'OR&Eacute;AL</h1>
          <p class="tagline">Smart Routine &amp; Product Advisor</p>
        </div>
      </div>
    </header>

    <!-- ── Chat scroll area ───────────────────────────────── -->
    <main id="main-scroll">
      <div class="chat-container">
        <!-- Latest user question banner — updates on each send, hidden at start -->
        <div class="user-question-display hidden" id="user-question-display">
          <span class="you-label">You:</span>
          <span id="user-question-text"></span>
        </div>

        <!-- Messages injected here by script.js -->
        <div class="chat-window" id="chat-window"></div>

        <!-- Typing indicator (hidden until AI is responding) -->
        <div class="typing-indicator hidden" id="typing-indicator">
          <div class="avatar assistant-avatar">L</div>
          <div class="bubble assistant-bubble typing-bubble">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </main>

    <!-- ── Input bar (always visible, below the scroll area) ─ -->
    <div class="input-bar">
      <div class="input-inner">
        <input
          type="text"
          id="user-input"
          placeholder="Ask me about any L'Oréal product or routine…"
          autocomplete="off"
          aria-label="Your message"
        />
        <button id="send-btn" aria-label="Send message">
          <!-- Right-arrow / send icon -->
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

    <!-- ── Footer ─────────────────────────────────────────── -->
    <footer>
      <p>&copy; 2025 L'Or&eacute;al. All rights reserved.</p>
      <nav>
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Use</a>
        <a href="#">Contact</a>
      </nav>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
